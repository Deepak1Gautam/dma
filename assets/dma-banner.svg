<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->

    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="400">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>

    <!-- Blue Glow -->

    <radialGradient id="blueGlow">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple Glow -->

    <radialGradient id="purpleGlow">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass -->

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Text Gradient -->

    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Glow Filter -->

    <filter id="blur">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Grid -->

    <pattern
      id="grid"
      width="40"
      height="40"
      patternUnits="userSpaceOnUse"
    >
      <path
        d="M 40 0 L 0 0 0 40"
        fill="none"
        stroke="#60A5FA"
        stroke-opacity="0.08"
        stroke-width="1"
      />
    </pattern>

  </defs>


  <!-- Background -->

  <rect
    width="1200"
    height="400"
    rx="28"
    fill="url(#background)"
  />

  <!-- Grid -->

  <rect
    width="1200"
    height="400"
    rx="28"
    fill="url(#grid)"
  />


  <!-- Background Glows -->

  <circle
    cx="150"
    cy="100"
    r="180"
    fill="url(#blueGlow)"
    filter="url(#blur)"
  >

    <animate
      attributeName="cx"
      values="150;260;150"
      dur="8s"
      repeatCount="indefinite"
    />

  </circle>


  <circle
    cx="1050"
    cy="300"
    r="220"
    fill="url(#purpleGlow)"
    filter="url(#blur)"
  >

    <animate
      attributeName="cy"
      values="300;180;300"
      dur="9s"
      repeatCount="indefinite"
    />

  </circle>


  <!-- Floating Particles -->

  <g fill="#60A5FA">

    <circle cx="90" cy="80" r="3">
      <animate
        attributeName="cy"
        values="80;50;80"
        dur="3s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="1080" cy="90" r="3">
      <animate
        attributeName="cy"
        values="90;120;90"
        dur="4s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="950" cy="330" r="2">
      <animate
        attributeName="cy"
        values="330;300;330"
        dur="3.5s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cx="260" cy="330" r="2">
      <animate
        attributeName="cy"
        values="330;360;330"
        dur="4.5s"
        repeatCount="indefinite"
      />
    </circle>

  </g>


  <!-- Main Glass Card -->

  <rect
    x="70"
    y="55"
    width="1060"
    height="290"
    rx="24"
    fill="url(#glass)"
    stroke="#60A5FA"
    stroke-opacity="0.18"
  />


  <!-- Left Brand -->

  <text
    x="120"
    y="155"
    fill="url(#textGradient)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="82"
    font-weight="900"
    letter-spacing="8"
  >
    DMA
  </text>


  <!-- Animated Underline -->

  <rect
    x="125"
    y="178"
    width="210"
    height="4"
    rx="2"
    fill="#3B82F6"
  >

    <animate
      attributeName="width"
      values="80;210;80"
      dur="3s"
      repeatCount="indefinite"
    />

  </rect>


  <!-- Tagline -->

  <text
    x="125"
    y="225"
    fill="#E2E8F0"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="2"
  >
    DO MORE. ACHIEVE MORE.
  </text>


  <!-- Animated Cycling Text -->

  <text
    x="125"
    y="275"
    fill="#94A3B8"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18"
  >

    <tspan opacity="1">
      Learn • Build • Earn • Grow

      <animate
        attributeName="opacity"
        values="1;0;1"
        dur="6s"
        repeatCount="indefinite"
      />

    </tspan>

  </text>


  <!-- Right Ecosystem -->

  <g transform="translate(800 200)">

    <!-- Orbit -->

    <circle
      cx="0"
      cy="0"
      r="105"
      fill="none"
      stroke="#3B82F6"
      stroke-opacity="0.25"
      stroke-width="2"
      stroke-dasharray="8 12"
    >

      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="18s"
        repeatCount="indefinite"
      />

    </circle>


    <circle
      cx="0"
      cy="0"
      r="72"
      fill="none"
      stroke="#A78BFA"
      stroke-opacity="0.3"
      stroke-width="2"
    >

      <animateTransform
        attributeName="transform"
        type="rotate"
        from="360"
        to="0"
        dur="12s"
        repeatCount="indefinite"
      />

    </circle>


    <!-- Center -->

    <circle
      cx="0"
      cy="0"
      r="52"
      fill="#2563EB"
      fill-opacity="0.9"
    />

    <text
      x="0"
      y="8"
      text-anchor="middle"
      fill="white"
      font-family="Arial, Helvetica, sans-serif"
      font-size="28"
      font-weight="900"
    >
      DMA
    </text>


    <!-- Orbit Nodes -->

    <g>

      <circle
        cx="-105"
        cy="0"
        r="24"
        fill="#1D4ED8"
        stroke="#60A5FA"
      />

      <text
        x="-105"
        y="6"
        text-anchor="middle"
        fill="white"
        font-size="20"
      >
        💼
      </text>


      <circle
        cx="105"
        cy="0"
        r="24"
        fill="#7C3AED"
        stroke="#A78BFA"
      />

      <text
        x="105"
        y="6"
        text-anchor="middle"
        fill="white"
        font-size="20"
      >
        🎓
      </text>


      <circle
        cx="0"
        cy="-105"
        r="24"
        fill="#059669"
        stroke="#34D399"
      />

      <text
        x="0"
        y="-99"
        text-anchor="middle"
        fill="white"
        font-size="20"
      >
        💰
      </text>


      <circle
        cx="0"
        cy="105"
        r="24"
        fill="#DB2777"
        stroke="#F472B6"
      />

      <text
        x="0"
        y="111"
        text-anchor="middle"
        fill="white"
        font-size="20"
      >
        🚀
      </text>

    </g>

  </g>


  <!-- Bottom Line -->

  <rect
    x="120"
    y="315"
    width="960"
    height="1"
    fill="#60A5FA"
    fill-opacity="0.2"
  />


  <!-- Bottom Text -->

  <text
    x="600"
    y="335"
    text-anchor="middle"
    fill="#64748B"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    letter-spacing="3"
  >
    STUDENT • SKILLS • OPPORTUNITIES • COMMUNITY
  </text>

</svg>
